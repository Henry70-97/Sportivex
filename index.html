<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VideoWork – Register / Login</title>
  <!-- Tailwind + Icons -->
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'DM Sans', sans-serif; background: #0a0a0a; }
    .toggle-password { cursor: pointer; position: absolute; right: 12px; top: 50%; transform: translateY(-50%); }
    .btn-primary { background: #e53e3e; transition: all 0.2s; }
    .btn-primary:hover { background: #c53030; transform: translateY(-1px); }
    .btn-google { background: #fff; color: #333; border: 1px solid #ddd; }
    .btn-google:hover { background: #f5f5f5; }
    .input-dark { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15); color: white; }
    .input-dark:focus { outline: none; border-color: #e53e3e; }
  </style>
  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBv5uc6d0JItCsZ-cjqAd5-Y-2aDPANqn0",
      authDomain: "navana-7ea5a.firebaseapp.com",
      projectId: "navana-7ea5a",
      storageBucket: "navana-7ea5a.firebasestorage.app",
      messagingSenderId: "237075740446",
      appId: "1:237075740446:web:bfbb2c2c84c77ffc633b0f",
      measurementId: "G-ZYG9QD7LX0"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    // DOM elements
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const nameInput = document.getElementById('name');
    const roleRadios = document.querySelectorAll('input[name="role"]');
    const loginEmail = document.getElementById('login-email');
    const loginPassword = document.getElementById('login-password');
    const toggleLogin = document.getElementById('toggle-login-pw');
    const toggleRegister = document.getElementById('toggle-reg-pw');
    const errorMsg = document.getElementById('error-msg');
    const loginError = document.getElementById('login-error');

    // Toggle password visibility
    function togglePassword(input, toggleBtn) {
      const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
      input.setAttribute('type', type);
      toggleBtn.innerHTML = type === 'password' ? '<i data-lucide="eye-off" style="width:18px;"></i>' : '<i data-lucide="eye" style="width:18px;"></i>';
      lucide.createIcons();
    }
    toggleLogin?.addEventListener('click', () => togglePassword(loginPassword, toggleLogin));
    toggleRegister?.addEventListener('click', () => togglePassword(passwordInput, toggleRegister));

    // Helper: create user doc after signup
    async function createUserDoc(user, name, role) {
      const userRef = doc(db, "users", user.uid);
      await setDoc(userRef, {
        name: name,
        email: user.email,
        role: role,
        balance: role === 'client' ? 5000 : 0,   // initial deposit for client
        isBanned: false,
        createdAt: new Date(),
        profileImage: user.photoURL || null,
      });
    }

    // Redirect based on role
    function redirectToDashboard(role) {
      if (role === 'admin') window.location.href = 'admin-dashboard.html';
      else if (role === 'client') window.location.href = 'client-dashboard.html';
      else window.location.href = 'worker-dashboard.html';  // placeholder
    }

    // Email/Password Registration
    window.register = async (e) => {
      e.preventDefault();
      const name = nameInput.value.trim();
      const email = emailInput.value.trim();
      const password = passwordInput.value;
      const role = document.querySelector('input[name="role"]:checked')?.value;
      if (!name || !email || !password || !role) {
        errorMsg.innerText = "All fields required";
        errorMsg.classList.remove('hidden');
        return;
      }
      errorMsg.classList.add('hidden');
      try {
        const userCred = await createUserWithEmailAndPassword(auth, email, password);
        await createUserDoc(userCred.user, name, role);
        alert("Registration successful! Redirecting...");
        redirectToDashboard(role);
      } catch (err) {
        errorMsg.innerText = err.message;
        errorMsg.classList.remove('hidden');
      }
    };

    // Email/Password Login
    window.login = async (e) => {
      e.preventDefault();
      const email = loginEmail.value.trim();
      const password = loginPassword.value;
      if (!email || !password) {
        loginError.innerText = "Email and password required";
        loginError.classList.remove('hidden');
        return;
      }
      loginError.classList.add('hidden');
      try {
        const userCred = await signInWithEmailAndPassword(auth, email, password);
        const userDoc = await getDoc(doc(db, "users", userCred.user.uid));
        if (!userDoc.exists()) throw new Error("User data missing");
        const role = userDoc.data().role;
        if (userDoc.data().isBanned) throw new Error("Account banned");
        redirectToDashboard(role);
      } catch (err) {
        loginError.innerText = err.message;
        loginError.classList.remove('hidden');
      }
    };

    // Google Login
    window.googleLogin = async () => {
      try {
        const result = await signInWithPopup(auth, provider);
        const user = result.user;
        const userDoc = await getDoc(doc(db, "users", user.uid));
        if (!userDoc.exists()) {
          // New Google user: ask for role
          const role = prompt("Select role: client or worker", "client");
          if (role !== 'client' && role !== 'worker') throw new Error("Invalid role");
          await createUserDoc(user, user.displayName || user.email.split('@')[0], role);
          redirectToDashboard(role);
        } else {
          if (userDoc.data().isBanned) throw new Error("Account banned");
          redirectToDashboard(userDoc.data().role);
        }
      } catch (err) {
        alert("Google sign-in failed: " + err.message);
      }
    };

    // Forgot password
    window.resetPassword = async () => {
      const email = loginEmail.value.trim();
      if (!email) {
        alert("Enter your email address first.");
        return;
      }
      try {
        await sendPasswordResetEmail(auth, email);
        alert("Password reset email sent. Check your inbox.");
      } catch (err) {
        alert("Error: " + err.message);
      }
    };

    // Show/hide forms
    window.showLogin = () => {
      document.getElementById('login-form').classList.remove('hidden');
      document.getElementById('register-form').classList.add('hidden');
      document.getElementById('login-tab').classList.add('border-b-2', 'border-red-500', 'text-red-500');
      document.getElementById('register-tab').classList.remove('border-b-2', 'border-red-500', 'text-red-500');
    };
    window.showRegister = () => {
      document.getElementById('login-form').classList.add('hidden');
      document.getElementById('register-form').classList.remove('hidden');
      document.getElementById('register-tab').classList.add('border-b-2', 'border-red-500', 'text-red-500');
      document.getElementById('login-tab').classList.remove('border-b-2', 'border-red-500', 'text-red-500');
    };
  </script>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
  <div class="w-full max-w-md bg-white/5 rounded-2xl p-6 shadow-2xl border border-white/10">
    <div class="flex gap-4 mb-6 border-b border-white/10">
      <button id="login-tab" onclick="showLogin()" class="pb-2 text-white/70 font-semibold border-b-2 border-red-500 text-red-500">Login</button>
      <button id="register-tab" onclick="showRegister()" class="pb-2 text-white/70 font-semibold">Register</button>
    </div>

    <!-- Login Form -->
    <div id="login-form">
      <form onsubmit="login(event)">
        <div class="relative mb-4">
          <input type="email" id="login-email" placeholder="Email" class="input-dark w-full p-3 rounded-xl pr-10" required>
        </div>
        <div class="relative mb-4">
          <input type="password" id="login-password" placeholder="Password" class="input-dark w-full p-3 rounded-xl pr-10" required>
          <span id="toggle-login-pw" class="toggle-password text-white/50 cursor-pointer">👁️</span>
        </div>
        <div id="login-error" class="text-red-400 text-sm mb-3 hidden"></div>
        <button type="submit" class="btn-primary w-full py-3 rounded-xl font-semibold">Log In</button>
      </form>
      <button onclick="googleLogin()" class="btn-google w-full mt-3 py-2.5 rounded-xl font-medium flex items-center justify-center gap-2"><svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>Sign in with Google</button>
      <div class="text-center mt-4 text-sm text-white/50">Forgot? <a onclick="resetPassword()" class="text-red-500 cursor-pointer">Reset password</a></div>
    </div>

    <!-- Registration Form -->
    <div id="register-form" class="hidden">
      <form onsubmit="register(event)">
        <input type="text" id="name" placeholder="Full Name" class="input-dark w-full p-3 rounded-xl mb-4" required>
        <input type="email" id="email" placeholder="Email" class="input-dark w-full p-3 rounded-xl mb-4" required>
        <div class="relative mb-4">
          <input type="password" id="password" placeholder="Password (min 6)" class="input-dark w-full p-3 rounded-xl pr-10" required minlength="6">
          <span id="toggle-reg-pw" class="toggle-password text-white/50 cursor-pointer">👁️</span>
        </div>
        <div class="flex gap-4 mb-4">
          <label class="flex items-center gap-2 text-white/70"><input type="radio" name="role" value="client" checked> <span>Client (Hire)</span></label>
          <label class="flex items-center gap-2 text-white/70"><input type="radio" name="role" value="worker"> <span>Worker (Find Work)</span></label>
        </div>
        <div id="error-msg" class="text-red-400 text-sm mb-3 hidden"></div>
        <button type="submit" class="btn-primary w-full py-3 rounded-xl font-semibold">Sign Up</button>
      </form>
      <button onclick="googleLogin()" class="btn-google w-full mt-3 py-2.5 rounded-xl font-medium flex items-center justify-center gap-2"><svg class="w-5 h-5" viewBox="0 0 24 24">...</svg>Sign up with Google</button>
    </div>
  </div>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
