<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BestPay - Register / Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDtGN7KCK0A4fhztLN0CgxsKkGROcO_-vI",
            authDomain: "bestpay-5b78c.firebaseapp.com",
            projectId: "bestpay-5b78c",
            storageBucket: "bestpay-5b78c.firebasestorage.app",
            messagingSenderId: "583230068716",
            appId: "1:583230068716:web:3e8d298b4d00b46c8652c9",
            measurementId: "G-47R37E08V2"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.showTab = (tab) => {
            document.getElementById('loginTab').classList.toggle('hidden', tab !== 'login');
            document.getElementById('registerTab').classList.toggle('hidden', tab !== 'register');
        };

        // Generate random referral code
        function generateReferralCode() {
            return Math.random().toString(36).substring(2, 8).toUpperCase();
        }

        // Register
        window.register = async () => {
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const username = document.getElementById('regUsername').value;
            const referralCode = document.getElementById('regReferral').value;

            try {
                const userCred = await createUserWithEmailAndPassword(auth, email, password);
                const uid = userCred.user.uid;
                const newReferralCode = generateReferralCode();

                // Find who invited (if referral code matches existing user)
                let referredBy = null;
                if (referralCode) {
                    const usersRef = collection(db, 'users');
                    const q = query(usersRef, where('referralCode', '==', referralCode));
                    const snap = await getDocs(q);
                    if (!snap.empty) referredBy = snap.docs[0].id;
                }

                // Create user document
                await setDoc(doc(db, 'users', uid), {
                    email,
                    displayName: username,
                    createdAt: new Date(),
                    referralCode: newReferralCode,
                    referredBy: referredBy,
                    kycStatus: 'unverified',
                    isSuspended: false,
                    isFrozen: false,
                    role: 'user',
                    totalEarned: 0,
                    withdrawableBalance: 0,
                    totalWithdrawn: 0
                });

                // Create wallet document
                await setDoc(doc(db, 'wallets', uid), {
                    investedBalance: 0,
                    bonusBalance: 0,
                    totalDeposited: 0,
                    lastUpdated: new Date()
                });

                // If referred, add referral record
                if (referredBy) {
                    await setDoc(doc(db, 'referrals', `${referredBy}_${uid}`), {
                        referrerId: referredBy,
                        referredId: uid,
                        commissionEarned: 0,
                        status: 'pending',
                        commissionRate: 0.1,
                        createdAt: new Date()
                    });
                }

                alert('Registration successful! Please login.');
                window.showTab('login');
            } catch (err) {
                alert('Error: ' + err.message);
            }
        };

        // Login
        window.login = async () => {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            try {
                await signInWithEmailAndPassword(auth, email, password);
                // Redirect based on role
                const user = auth.currentUser;
                const userDoc = await getDoc(doc(db, 'users', user.uid));
                const role = userDoc.data()?.role || 'user';
                if (role === 'admin') {
                    window.location.href = 'admin_dashboard.html';
                } else {
                    window.location.href = 'user_dashboard.html';
                }
            } catch (err) {
                alert('Login failed: ' + err.message);
            }
        };

        // Check if already logged in
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const userDoc = await getDoc(doc(db, 'users', user.uid));
                const role = userDoc.data()?.role || 'user';
                if (role === 'admin') window.location.href = 'admin_dashboard.html';
                else window.location.href = 'user_dashboard.html';
            }
        });
    </script>
</head>
<body class="bg-gray-100">
    <div class="max-w-md mx-auto mt-20 bg-white p-8 rounded shadow">
        <div class="flex gap-4 mb-6">
            <button onclick="showTab('login')" class="flex-1 py-2 bg-blue-600 text-white rounded">Login</button>
            <button onclick="showTab('register')" class="flex-1 py-2 bg-gray-200 rounded">Register</button>
        </div>

        <!-- Login Tab -->
        <div id="loginTab">
            <h2 class="text-2xl font-bold mb-4">Login</h2>
            <input type="email" id="loginEmail" placeholder="Email" class="w-full p-2 border rounded mb-3">
            <input type="password" id="loginPassword" placeholder="Password" class="w-full p-2 border rounded mb-3">
            <button onclick="login()" class="w-full bg-blue-600 text-white py-2 rounded">Login</button>
        </div>

        <!-- Register Tab -->
        <div id="registerTab" class="hidden">
            <h2 class="text-2xl font-bold mb-4">Register</h2>
            <input type="text" id="regUsername" placeholder="Username" class="w-full p-2 border rounded mb-3">
            <input type="email" id="regEmail" placeholder="Email" class="w-full p-2 border rounded mb-3">
            <input type="password" id="regPassword" placeholder="Password" class="w-full p-2 border rounded mb-3">
            <input type="text" id="regReferral" placeholder="Referral Code (optional)" class="w-full p-2 border rounded mb-3">
            <button onclick="register()" class="w-full bg-green-600 text-white py-2 rounded">Sign Up</button>
        </div>
    </div>
</body>
</html>
