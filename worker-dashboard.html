<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Worker Dashboard – VideoWork</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'DM Sans', sans-serif; background: #0a0a0a; }
    .status-badge { display: inline-block; padding: 2px 8px; border-radius: 9999px; font-size: 12px; font-weight: 600; }
    .status-approved { background: #065f46; color: #6ee7b7; }
    .status-pending { background: #78350f; color: #fbbf24; }
    .status-accepted { background: #065f46; color: #6ee7b7; }
    .status-rejected { background: #991b1b; color: #fca5a5; }
    .btn-primary { background: #e53e3e; transition: 0.2s; }
    .btn-primary:hover { background: #c53030; transform: translateY(-1px); }
    .input-dark { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15); color: white; }
    .modal-overlay { background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); }
    .chat-message { padding: 8px 12px; border-radius: 12px; margin: 6px 0; max-width: 80%; }
    .chat-message.sent { background: #e53e3e; color: white; align-self: flex-end; }
    .chat-message.received { background: #2d3748; color: white; align-self: flex-start; }
    /* Hamburger menu styles */
    .sidebar { transition: transform 0.3s ease; }
    .sidebar.open { transform: translateX(0); }
    @media (max-width: 768px) { .sidebar { transform: translateX(-100%); } }
  </style>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-auth.js";
    import { getFirestore, collection, doc, getDoc, getDocs, updateDoc, addDoc, query, where, orderBy, onSnapshot, writeBatch } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBv5uc6d0JItCsZ-cjqAd5-Y-2aDPANqn0",
      authDomain: "navana-7ea5a.firebaseapp.com",
      projectId: "navana-7ea5a",
      storageBucket: "navana-7ea5a.firebasestorage.app",
      messagingSenderId: "237075740446",
      appId: "1:237075740446:web:bfbb2c2c84c77ffc633b0f",
      measurementId: "G-ZYG9QD7LX0"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    let currentUser = null;
    let currentUserData = null;

    // DOM elements
    const userNameSpan = document.getElementById('user-name');
    const userBalanceSpan = document.getElementById('user-balance');
    const mainContent = document.getElementById('main-content');
    let tasksUnsubscribe = null;
    let appsUnsubscribe = null;

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = 'register.html';
        return;
      }
      const userDoc = await getDoc(doc(db, "users", user.uid));
      if (!userDoc.exists() || userDoc.data().role !== 'worker') {
        alert("Access denied: You are not a worker.");
        signOut(auth);
        window.location.href = 'register.html';
        return;
      }
      currentUser = user;
      currentUserData = userDoc.data();
      userNameSpan.innerText = currentUserData.name;
      userBalanceSpan.innerText = `$${currentUserData.balance?.toFixed(2) || 0}`;
      loadJobs(); // default view
      loadApplications();
      loadNotifications();
    });

    // Navigation via hamburger
    window.loadJobs = () => {
      if (tasksUnsubscribe) tasksUnsubscribe();
      const q = query(collection(db, "tasks"), where("status", "==", "approved"), orderBy("createdAt", "desc"));
      tasksUnsubscribe = onSnapshot(q, (snapshot) => {
        renderJobs(snapshot.docs.map(d => ({ id: d.id, ...d.data() })));
      });
    };

    function renderJobs(jobs) {
      mainContent.innerHTML = `
        <h2 class="text-xl font-semibold mb-4">Available Jobs</h2>
        <div class="grid md:grid-cols-2 gap-4">
          ${jobs.map(job => `
            <div class="bg-white/5 p-4 rounded-xl border border-white/10">
              <div class="flex justify-between"><h3 class="font-bold">${escapeHtml(job.title)}</h3><span class="status-badge status-approved">${job.status}</span></div>
              <p class="text-sm text-white/60 mt-1">${escapeHtml(job.description)}</p>
              <div class="flex gap-4 text-xs text-white/40 mt-2">💰 $${job.budget} | 📅 ${job.deadline?.toDate?.().toLocaleDateString()} | 📂 ${job.category}</div>
              ${!job.applications?.includes(currentUser.uid) ? `<button onclick="applyJob('${job.id}', ${job.budget})" class="mt-3 text-xs bg-green-600 px-3 py-1 rounded">Apply</button>` : '<span class="text-xs text-green-400 mt-2 inline-block">Applied</span>'}
            </div>
          `).join('')}
        </div>
      `;
    }

    window.applyJob = async (taskId, maxBudget) => {
      const proposed = prompt("Enter your proposed budget (max $" + maxBudget + "):", maxBudget);
      if (!proposed) return;
      const proposedNum = parseFloat(proposed);
      if (proposedNum > maxBudget) {
        alert("Your proposal cannot exceed client's budget.");
        return;
      }
      const message = prompt("Brief cover letter:", "");
      if (!message) return;
      try {
        await addDoc(collection(db, "applications"), {
          taskId: taskId,
          workerId: currentUser.uid,
          workerName: currentUserData.name,
          proposedBudget: proposedNum,
          message: message,
          status: "pending",
          createdAt: new Date()
        });
        // Update task applications array
        const taskRef = doc(db, "tasks", taskId);
        await updateDoc(taskRef, {
          applications: arrayUnion(currentUser.uid)
        });
        alert("Application submitted!");
      } catch (err) {
        alert("Error: " + err.message);
      }
    };

    window.loadApplications = () => {
      if (appsUnsubscribe) appsUnsubscribe();
      const q = query(collection(db, "applications"), where("workerId", "==", currentUser.uid), orderBy("createdAt", "desc"));
      appsUnsubscribe = onSnapshot(q, (snap) => {
        const container = document.getElementById('applications-list');
        if (snap.empty) container.innerHTML = '<p class="text-white/50">No applications yet.</p>';
        else {
          container.innerHTML = snap.docs.map(doc => {
            const app = doc.data();
            return `<div class="bg-white/5 p-3 rounded-xl mb-2"><div class="flex justify-between"><span class="font-semibold">Task ID: ${app.taskId}</span><span class="status-badge status-${app.status}">${app.status}</span></div><p class="text-sm">💰 $${app.proposedBudget}</p><p class="text-sm">${escapeHtml(app.message)}</p></div>`;
          }).join('');
        }
      });
    };

    window.loadWallet = () => {
      mainContent.innerHTML = `
        <div class="bg-white/5 p-6 rounded-xl">
          <h2 class="text-xl font-semibold mb-2">Wallet Balance</h2>
          <div class="text-3xl font-mono text-green-400">$${(currentUserData.balance || 0).toFixed(2)}</div>
          <button onclick="requestWithdrawal()" class="mt-4 btn-primary px-4 py-2 rounded-lg text-sm">Request Withdrawal</button>
        </div>
        <div class="mt-6"><h3 class="font-semibold">Transaction History</h3><div id="transactions-list">Loading...</div></div>
      `;
      loadTransactions();
    };

    async function loadTransactions() {
      const q = query(collection(db, "transactions"), where("userId", "==", currentUser.uid), orderBy("createdAt", "desc"));
      const snap = await getDocs(q);
      const container = document.getElementById('transactions-list');
      if (snap.empty) container.innerHTML = '<p class="text-white/50">No transactions yet.</p>';
      else {
        container.innerHTML = snap.docs.map(d => {
          const tx = d.data();
          return `<div class="bg-white/5 p-2 rounded mb-1 flex justify-between"><span>${tx.description}</span><span class="${tx.amount > 0 ? 'text-green-400' : 'text-red-400'}">${tx.amount > 0 ? '+' : ''}$${tx.amount}</span></div>`;
        }).join('');
      }
    }

    window.requestWithdrawal = async () => {
      const amount = parseFloat(prompt("Enter amount to withdraw (min $10):", "10"));
      if (isNaN(amount) || amount < 10) { alert("Minimum $10"); return; }
      if (amount > currentUserData.balance) { alert("Insufficient balance"); return; }
      const method = prompt("Withdrawal method: mpesa, bank, paypal", "mpesa");
      const details = prompt("Enter account details (e.g., phone number):", "");
      if (!details) return;
      try {
        await addDoc(collection(db, "withdrawals"), {
          workerId: currentUser.uid,
          amount: amount,
          status: "pending",
          method: method,
          details: { info: details },
          requestedAt: new Date()
        });
        alert("Withdrawal request submitted for admin approval.");
      } catch (err) { alert("Error: " + err.message); }
    };

    // Chat (similar to client version but with worker as participant)
    window.openChat = async (taskId, clientId, clientName) => {
      // Find existing chat
      const chatsQuery = query(collection(db, "chats"), where("participants", "array-contains", currentUser.uid));
      const chatsSnap = await getDocs(chatsQuery);
      let chatId = null;
      chatsSnap.forEach(doc => {
        const participants = doc.data().participants;
        if (participants.includes(clientId) && participants.includes(currentUser.uid)) chatId = doc.id;
      });
      if (!chatId) {
        const newChatRef = await addDoc(collection(db, "chats"), {
          participants: [currentUser.uid, clientId],
          taskId: taskId,
          lastMessage: "",
          lastUpdated: new Date(),
          isActive: true
        });
        chatId = newChatRef.id;
      }
      document.getElementById('chat-title').innerText = `Chat with ${clientName}`;
      document.getElementById('chat-messages').innerHTML = '';
      document.getElementById('chat-input').value = '';
      document.getElementById('send-message').onclick = () => sendMessage(chatId, clientId);
      const messagesRef = collection(db, "chats", chatId, "messages");
      onSnapshot(query(messagesRef, orderBy("timestamp", "asc")), (snap) => {
        const container = document.getElementById('chat-messages');
        container.innerHTML = '';
        snap.forEach(msgDoc => {
          const msg = msgDoc.data();
          const div = document.createElement('div');
          div.className = `chat-message ${msg.senderId === currentUser.uid ? 'sent' : 'received'}`;
          div.innerText = msg.text;
          container.appendChild(div);
        });
        container.scrollTop = container.scrollHeight;
      });
      document.getElementById('chat-modal').classList.remove('hidden');
    };

    async function sendMessage(chatId, recipientId) {
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      const msgRef = collection(db, "chats", chatId, "messages");
      await addDoc(msgRef, {
        senderId: currentUser.uid,
        text: text,
        timestamp: new Date(),
        read: false
      });
      await updateDoc(doc(db, "chats", chatId), { lastMessage: text, lastUpdated: new Date() });
      // send notification to recipient
    }

    function loadNotifications() {
      const q = query(collection(db, "notifications"), where("userId", "==", currentUser.uid), orderBy("createdAt", "desc"));
      onSnapshot(q, (snap) => {
        const unreadCount = snap.docs.filter(d => !d.data().read).length;
        document.getElementById('notif-count').innerText = unreadCount;
        const container = document.getElementById('notifications-list');
        container.innerHTML = snap.docs.map(d => {
          const notif = d.data();
          return `<div class="p-2 border-b border-white/10 flex justify-between"><span>${notif.title}</span><button onclick="markRead('${d.id}')" class="text-xs text-red-400">Mark read</button></div>`;
        }).join('');
      });
    }

    window.markRead = async (id) => {
      await updateDoc(doc(db, "notifications", id), { read: true });
    };

    function escapeHtml(str) { return (str || '').replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    // UI helpers
    window.toggleSidebar = () => {
      document.getElementById('sidebar').classList.toggle('open');
    };
    window.hideModal = (id) => document.getElementById(id).classList.add('hidden');
    window.showModal = (id) => document.getElementById(id).classList.remove('hidden');
    window.logout = () => signOut(auth).then(() => window.location.href = 'register.html');
  </script>
</head>
<body>
  <!-- Hamburger Button -->
  <button id="menu-btn" onclick="toggleSidebar()" class="fixed top-4 left-4 z-50 md:hidden bg-white/10 p-2 rounded-lg">☰</button>

  <!-- Sidebar -->
  <div id="sidebar" class="sidebar fixed top-0 left-0 h-full w-64 bg-[#1a1a2e] z-40 transform -translate-x-full md:translate-x-0 transition-transform duration-300 shadow-lg">
    <div class="p-6">
      <div class="text-xl font-bold mb-8">VideoWork</div>
      <nav class="space-y-3">
        <button onclick="loadJobs(); toggleSidebar();" class="block w-full text-left py-2 px-4 rounded hover:bg-white/10">📋 Browse Jobs</button>
        <button onclick="document.getElementById('applications-section').scrollIntoView(); loadApplications(); toggleSidebar();" class="block w-full text-left py-2 px-4 rounded hover:bg-white/10">📝 My Applications</button>
        <button onclick="loadWallet(); toggleSidebar();" class="block w-full text-left py-2 px-4 rounded hover:bg-white/10">💰 Wallet</button>
        <button onclick="document.getElementById('chat-modal').classList.remove('hidden'); toggleSidebar();" class="block w-full text-left py-2 px-4 rounded hover:bg-white/10">💬 Messages</button>
        <button onclick="logout()" class="block w-full text-left py-2 px-4 rounded hover:bg-white/10 text-red-400">🚪 Logout</button>
      </nav>
      <div class="absolute bottom-4 left-4 text-sm text-white/40">v1.0</div>
    </div>
  </div>

  <!-- Main Content -->
  <div class="md:ml-64 p-6">
    <div class="flex justify-between items-center mb-6">
      <div>
        <h1 class="text-2xl font-bold">Worker Dashboard</h1>
        <p class="text-white/60">Welcome, <span id="user-name"></span> | Balance: <span id="user-balance"></span></p>
      </div>
      <div class="relative">
        <button onclick="showModal('notifications-modal')">🔔 <span id="notif-count" class="absolute -top-2 -right-2 bg-red-500 text-xs rounded-full px-1"></span></button>
      </div>
    </div>
    <div id="main-content">
      <!-- Dynamic content loaded via JS -->
    </div>

    <!-- Applications Section -->
    <div id="applications-section" class="mt-8">
      <h2 class="text-xl font-semibold mb-4">My Applications</h2>
      <div id="applications-list"></div>
    </div>
  </div>

  <!-- Chat Modal -->
  <div id="chat-modal" class="fixed inset-0 z-50 modal-overlay flex items-center justify-center hidden">
    <div class="bg-[#1a1a2e] w-full max-w-md p-4 rounded-2xl flex flex-col h-96">
      <div class="flex justify-between items-center mb-2"><h3 id="chat-title" class="font-bold"></h3><button onclick="hideModal('chat-modal')">✕</button></div>
      <div id="chat-messages" class="flex-1 overflow-y-auto p-2 bg-black/30 rounded"></div>
      <div class="flex mt-2 gap-2"><input id="chat-input" type="text" class="input-dark flex-1 p-2 rounded" placeholder="Type a message..."><button id="send-message" class="btn-primary px-3 py-2 rounded">Send</button></div>
    </div>
  </div>

  <!-- Notifications Modal -->
  <div id="notifications-modal" class="fixed inset-0 z-50 modal-overlay flex items-center justify-center hidden">
    <div class="bg-[#1a1a2e] w-full max-w-md p-4 rounded-2xl">
      <div class="flex justify-between"><h3 class="font-bold">Notifications</h3><button onclick="hideModal('notifications-modal')">✕</button></div>
      <div id="notifications-list" class="mt-2 max-h-96 overflow-auto"></div>
    </div>
  </div>
</body>
</html>
