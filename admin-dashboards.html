<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - BestPay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc, collection, getDocs, query, where, addDoc, serverTimestamp, increment, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDtGN7KCK0A4fhztLN0CgxsKkGROcO_-vI", authDomain: "bestpay-5b78c.firebaseapp.com", projectId: "bestpay-5b78c", storageBucket: "bestpay-5b78c.firebasestorage.app", messagingSenderId: "583230068716", appId: "1:583230068716:web:3e8d298b4d00b46c8652c9", measurementId: "G-47R37E08V2" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentAdmin = null;

        // Ensure there is at least one admin (if none, set current user as admin)
        async function ensureAdmin() {
            const user = auth.currentUser;
            if (!user) return false;
            const userDoc = await getDoc(doc(db, 'users', user.uid));
            if (userDoc.exists() && userDoc.data().role === 'admin') {
                currentAdmin = user;
                return true;
            } else {
                // If no admin exists, assign admin role to this user (first time)
                const adminQuery = await getDocs(query(collection(db, 'users'), where('role', '==', 'admin')));
                if (adminQuery.empty) {
                    await setDoc(doc(db, 'users', user.uid), { role: 'admin' }, { merge: true });
                    currentAdmin = user;
                    return true;
                }
                alert('You are not an admin.');
                window.location.href = 'registration.html';
                return false;
            }
        }

        async function loadUsers() {
            const usersSnap = await getDocs(collection(db, 'users'));
            const tbody = document.getElementById('usersTableBody');
            tbody.innerHTML = '';
            for (const userDoc of usersSnap.docs) {
                const user = userDoc.data();
                const uid = userDoc.id;
                const walletSnap = await getDoc(doc(db, 'wallets', uid));
                const wallet = walletSnap.exists() ? walletSnap.data() : { bonusBalance: 0, investedBalance: 0 };
                const totalBalance = (wallet.bonusBalance || 0) + (wallet.investedBalance || 0);
                tbody.innerHTML += `
                    <tr class="border-b">
                        <td class="p-2">${user.email}</td>
                        <td class="p-2">${user.displayName || ''}</td>
                        <td class="p-2">${user.kycStatus || 'unverified'}</td>
                        <td class="p-2">${user.isSuspended ? 'Yes' : 'No'}</td>
                        <td class="p-2">${user.isFrozen ? 'Yes' : 'No'}</td>
                        <td class="p-2">$${totalBalance}</td>
                        <td class="p-2">
                            <button onclick="adjustWallet('${uid}', ${totalBalance})" class="bg-yellow-500 text-white px-2 py-1 rounded text-sm">Adjust</button>
                            <button onclick="toggleSuspend('${uid}', ${user.isSuspended})" class="bg-red-500 text-white px-2 py-1 rounded text-sm">${user.isSuspended ? 'Unsuspend' : 'Suspend'}</button>
                            <button onclick="toggleFreeze('${uid}', ${user.isFrozen})" class="bg-orange-500 text-white px-2 py-1 rounded text-sm">${user.isFrozen ? 'Unfreeze' : 'Freeze'}</button>
                            <button onclick="toggleVerify('${uid}', '${user.kycStatus}')" class="bg-green-500 text-white px-2 py-1 rounded text-sm">${user.kycStatus === 'verified' ? 'Unverify' : 'Verify'}</button>
                            <button onclick="deactivateAccount('${uid}')" class="bg-gray-700 text-white px-2 py-1 rounded text-sm">Deactivate</button>
                        </td>
                    </tr>
                `;
            }
        }

        window.adjustWallet = async (uid, currentBalance) => {
            const newBalance = prompt(`Current total balance: $${currentBalance}. Enter new total balance:`, currentBalance);
            if (newBalance === null) return;
            const diff = parseFloat(newBalance) - currentBalance;
            const walletRef = doc(db, 'wallets', uid);
            const wallet = (await getDoc(walletRef)).data();
            // Apply difference to bonusBalance
            await updateDoc(walletRef, { bonusBalance: (wallet.bonusBalance || 0) + diff });
            alert('Wallet updated');
            loadUsers();
        };

        window.toggleSuspend = async (uid, current) => {
            await updateDoc(doc(db, 'users', uid), { isSuspended: !current });
            loadUsers();
        };
        window.toggleFreeze = async (uid, current) => {
            await updateDoc(doc(db, 'users', uid), { isFrozen: !current });
            loadUsers();
        };
        window.toggleVerify = async (uid, currentStatus) => {
            const newStatus = currentStatus === 'verified' ? 'unverified' : 'verified';
            await updateDoc(doc(db, 'users', uid), { kycStatus: newStatus });
            loadUsers();
        };
        window.deactivateAccount = async (uid) => {
            if (confirm('Deactivate this account? User will not be able to log in.')) {
                // Instead of deleting, set a flag 'deactivated'
                await updateDoc(doc(db, 'users', uid), { isSuspended: true, deactivated: true });
                alert('Account deactivated');
                loadUsers();
            }
        };

        // Support tickets management
        async function loadTickets() {
            const ticketsSnap = await getDocs(collection(db, 'support_tickets'));
            const ticketsDiv = document.getElementById('ticketsList');
            ticketsDiv.innerHTML = '';
            for (const ticketDoc of ticketsSnap.docs) {
                const ticket = ticketDoc.data();
                const ticketId = ticketDoc.id;
                ticketsDiv.innerHTML += `
                    <div class="border p-4 mb-2 rounded shadow">
                        <div><strong>${ticket.subject}</strong> (${ticket.status}) - ${ticket.userEmail}</div>
                        <div class="text-sm">${ticket.message}</div>
                        <div class="mt-2">
                            <textarea id="reply_${ticketId}" placeholder="Admin reply" class="border p-1 w-full"></textarea>
                            <button onclick="replyToTicket('${ticketId}', '${ticket.userId}')" class="bg-blue-600 text-white px-3 py-1 rounded mt-1">Reply</button>
                            <select id="status_${ticketId}" class="ml-2 border p-1">
                                <option ${ticket.status === 'pending' ? 'selected' : ''}>pending</option>
                                <option ${ticket.status === 'in_progress' ? 'selected' : ''}>in_progress</option>
                                <option ${ticket.status === 'resolved' ? 'selected' : ''}>resolved</option>
                            </select>
                            <button onclick="updateTicketStatus('${ticketId}')" class="bg-gray-500 text-white px-3 py-1 rounded">Update Status</button>
                        </div>
                    </div>
                `;
            }
        }

        window.replyToTicket = async (ticketId, userId) => {
            const replyMsg = document.getElementById(`reply_${ticketId}`).value;
            if (!replyMsg) return alert('Enter reply');
            // Add message to subcollection
            const msgRef = collection(db, `support_tickets/${ticketId}/messages`);
            await addDoc(msgRef, {
                senderId: currentAdmin.uid,
                senderName: 'Admin',
                senderRole: 'admin',
                message: replyMsg,
                timestamp: serverTimestamp(),
                isRead: false
            });
            // Update ticket updatedAt
            await updateDoc(doc(db, 'support_tickets', ticketId), { updatedAt: serverTimestamp() });
            // Create notification for user
            await addDoc(collection(db, 'notifications'), {
                userId: userId,
                title: 'Support Reply',
                body: `Admin replied to your ticket: ${replyMsg.substring(0, 100)}`,
                type: 'support_reply',
                isRead: false,
                createdAt: serverTimestamp()
            });
            alert('Reply sent');
            document.getElementById(`reply_${ticketId}`).value = '';
            loadTickets();
        };

        window.updateTicketStatus = async (ticketId) => {
            const newStatus = document.getElementById(`status_${ticketId}`).value;
            await updateDoc(doc(db, 'support_tickets', ticketId), { status: newStatus, updatedAt: serverTimestamp() });
            alert('Status updated');
            loadTickets();
        };

        // Investment plans management (admin can add plans with product image)
        window.addInvestmentPlan = async () => {
            const name = prompt('Plan name');
            const minAmount = parseFloat(prompt('Min amount'));
            const roiPercent = parseFloat(prompt('ROI %'));
            const productImageURL = prompt('Product image URL');
            const productURL = prompt('Product link (affiliate)');
            const productDesc = prompt('Short description');
            if (name && minAmount && roiPercent) {
                await addDoc(collection(db, 'investment_plans'), {
                    name, minAmount, roiPercent, productImageURL, productURL, productDescription: productDesc,
                    isActive: true, durationDays: 30
                });
                alert('Plan added');
                loadPlans();
            }
        };

        async function loadPlans() {
            const plansSnap = await getDocs(collection(db, 'investment_plans'));
            const plansDiv = document.getElementById('plansList');
            plansDiv.innerHTML = '';
            plansSnap.forEach(doc => {
                const p = doc.data();
                plansDiv.innerHTML += `<div class="border p-2 m-1 inline-block">${p.name} - ${p.roiPercent}% <button onclick="deletePlan('${doc.id}')" class="text-red-600 ml-2">Delete</button></div>`;
            });
        }

        window.deletePlan = async (planId) => {
            if (confirm('Delete plan?')) await deleteDoc(doc(db, 'investment_plans', planId));
            loadPlans();
        };

        window.logout = async () => { await signOut(auth); window.location.href = 'registration.html'; };

        async function init() {
            if (await ensureAdmin()) {
                loadUsers();
                loadTickets();
                loadPlans();
            }
        }

        auth.onAuthStateChanged(user => { if (user) init(); else window.location.href = 'registration.html'; });
    </script>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto p-6">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-bold">Admin Dashboard</h1>
            <button onclick="logout()" class="bg-red-600 text-white px-4 py-2 rounded">Logout</button>
        </div>

        <div class="bg-white p-4 rounded shadow mb-6">
            <h2 class="text-2xl font-bold mb-4">Users Management</h2>
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead><tr><th>Email</th><th>Name</th><th>KYC</th><th>Suspended</th><th>Frozen</th><th>Balance</th><th>Actions</th></tr></thead>
                    <tbody id="usersTableBody"></tbody>
                </table>
            </div>
        </div>

        <div class="bg-white p-4 rounded shadow mb-6">
            <h2 class="text-2xl font-bold mb-4">Support Tickets</h2>
            <div id="ticketsList"></div>
        </div>

        <div class="bg-white p-4 rounded shadow">
            <h2 class="text-2xl font-bold mb-4">Investment Plans</h2>
            <button onclick="addInvestmentPlan()" class="bg-green-600 text-white px-4 py-2 rounded mb-4">Add New Plan</button>
            <div id="plansList"></div>
        </div>
    </div>
</body>
</html>
