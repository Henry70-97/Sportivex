<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard - BestPay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc, collection, getDocs, addDoc, setDoc, query, where, increment, serverTimestamp, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDtGN7KCK0A4fhztLN0CgxsKkGROcO_-vI", authDomain: "bestpay-5b78c.firebaseapp.com", projectId: "bestpay-5b78c", storageBucket: "bestpay-5b78c.firebasestorage.app", messagingSenderId: "583230068716", appId: "1:583230068716:web:3e8d298b4d00b46c8652c9", measurementId: "G-47R37E08V2" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let userData = null;

        // Load dashboard
        async function loadDashboard() {
            const user = auth.currentUser;
            if (!user) { window.location.href = 'registration.html'; return; }
            currentUser = user;
            const userDoc = await getDoc(doc(db, 'users', user.uid));
            userData = userDoc.data();
            if (userData.isSuspended) {
                document.body.innerHTML = '<div class="p-10 text-center text-red-600">Your account is suspended. Contact support.</div>';
                return;
            }
            if (userData.isFrozen) {
                document.getElementById('freezeMsg').classList.remove('hidden');
            }
            document.getElementById('userName').innerText = userData.displayName;
            document.getElementById('referralLink').value = `${window.location.origin}/registration.html?ref=${userData.referralCode}`;
            
            // Load wallet
            const walletDoc = await getDoc(doc(db, 'wallets', user.uid));
            const wallet = walletDoc.data();
            document.getElementById('withdrawable').innerText = wallet?.bonusBalance + wallet?.investedBalance || 0;
            document.getElementById('invested').innerText = wallet?.investedBalance || 0;
            document.getElementById('bonus').innerText = wallet?.bonusBalance || 0;

            // Load investment plans
            const plansSnap = await getDocs(collection(db, 'investment_plans'));
            const plansDiv = document.getElementById('investmentPlans');
            plansDiv.innerHTML = '';
            plansSnap.forEach(plan => {
                const p = plan.data();
                plansDiv.innerHTML += `
                    <div class="border p-4 rounded shadow">
                        <img src="${p.productImageURL || 'https://via.placeholder.com/100'}" class="h-32 w-full object-cover rounded mb-2">
                        <h3 class="font-bold">${p.name}</h3>
                        <p>${p.productDescription || ''}</p>
                        <p class="text-sm">Min: $${p.minAmount} | ROI: ${p.roiPercent}%</p>
                        <button onclick="invest('${plan.id}', ${p.minAmount})" class="mt-2 bg-green-600 text-white px-3 py-1 rounded">Invest</button>
                    </div>
                `;
            });

            // Load support tickets
            const ticketsSnap = await getDocs(query(collection(db, 'support_tickets'), where('userId', '==', user.uid)));
            const ticketsDiv = document.getElementById('supportTickets');
            ticketsDiv.innerHTML = '';
            ticketsSnap.forEach(doc => {
                const t = doc.data();
                ticketsDiv.innerHTML += `<div class="border-b py-2"><strong>${t.subject}</strong> - Status: ${t.status}<br><small>${t.message.substring(0, 100)}</small></div>`;
            });
        }

        window.invest = async (planId, minAmount) => {
            const amount = prompt(`Enter amount (min $${minAmount})`);
            if (!amount || amount < minAmount) return alert('Invalid amount');
            const walletRef = doc(db, 'wallets', currentUser.uid);
            const wallet = (await getDoc(walletRef)).data();
            if ((wallet.bonusBalance + wallet.investedBalance) < amount) return alert('Insufficient balance');
            // For demo, just deduct from bonusBalance
            await updateDoc(walletRef, { bonusBalance: increment(-amount), investedBalance: increment(amount) });
            await addDoc(collection(db, 'investments'), {
                userId: currentUser.uid,
                planId: planId,
                amount: parseFloat(amount),
                startDate: serverTimestamp(),
                endDate: new Date(Date.now() + 30*86400000),
                status: 'active',
                roiEarned: 0
            });
            alert('Investment successful!');
            location.reload();
        };

        window.spinWheel = async () => {
            // Simple spin: random prize $0.5 to $5
            const prize = (Math.random() * 5 + 0.5).toFixed(2);
            const walletRef = doc(db, 'wallets', currentUser.uid);
            await updateDoc(walletRef, { bonusBalance: increment(parseFloat(prize)) });
            await addDoc(collection(db, 'transactions'), {
                userId: currentUser.uid,
                type: 'spin_win',
                amount: parseFloat(prize),
                status: 'completed',
                description: `Spin win $${prize}`,
                timestamp: serverTimestamp()
            });
            alert(`You won $${prize}!`);
            location.reload();
        };

        window.submitTicket = async () => {
            const subject = document.getElementById('ticketSubject').value;
            const message = document.getElementById('ticketMessage').value;
            if (!subject || !message) return alert('Fill all fields');
            await addDoc(collection(db, 'support_tickets'), {
                userId: currentUser.uid,
                userEmail: currentUser.email,
                subject,
                message,
                status: 'pending',
                priority: 'medium',
                category: 'other',
                createdAt: serverTimestamp(),
                updatedAt: serverTimestamp(),
                assignedTo: null
            });
            alert('Ticket submitted. Admin will reply soon.');
            document.getElementById('ticketSubject').value = '';
            document.getElementById('ticketMessage').value = '';
            loadDashboard();
        };

        window.logout = async () => { await signOut(auth); window.location.href = 'registration.html'; };

        auth.onAuthStateChanged(user => { if (user) loadDashboard(); else window.location.href = 'registration.html'; });
    </script>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto p-6">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-bold">User Dashboard</h1>
            <button onclick="logout()" class="bg-red-600 text-white px-4 py-2 rounded">Logout</button>
        </div>
        <div id="freezeMsg" class="hidden bg-yellow-200 p-3 rounded mb-4">⚠️ Your account is frozen. You cannot perform transactions.</div>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-4 rounded shadow">
                <h2 class="text-xl font-bold">Wallet</h2>
                <p>Withdrawable: $<span id="withdrawable">0</span></p>
                <p>Invested: $<span id="invested">0</span></p>
                <p>Bonus: $<span id="bonus">0</span></p>
                <button onclick="spinWheel()" class="mt-3 bg-purple-600 text-white px-4 py-2 rounded w-full">🎡 Spin Wheel</button>
            </div>
            <div class="bg-white p-4 rounded shadow col-span-2">
                <h2 class="text-xl font-bold">Referral Link</h2>
                <input type="text" id="referralLink" readonly class="w-full p-2 border rounded">
            </div>
        </div>

        <div class="mt-8">
            <h2 class="text-2xl font-bold">Investment Plans</h2>
            <div id="investmentPlans" class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-4"></div>
        </div>

        <div class="mt-8 bg-white p-4 rounded shadow">
            <h2 class="text-xl font-bold">Support Tickets</h2>
            <div class="mb-4">
                <input type="text" id="ticketSubject" placeholder="Subject" class="border p-2 w-full mb-2">
                <textarea id="ticketMessage" placeholder="Message" class="border p-2 w-full mb-2" rows="3"></textarea>
                <button onclick="submitTicket()" class="bg-blue-600 text-white px-4 py-2 rounded">Submit Ticket</button>
            </div>
            <div id="supportTickets" class="mt-4"></div>
        </div>
    </div>
</body>
</html>
